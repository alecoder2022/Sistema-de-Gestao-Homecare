<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos</title>
    <link rel="stylesheet" href="../estilos/style_cadastros.css">
    <style>
        body {
            font-family: 'Uber', Arial, sans-serif;
            /* background-image: linear-gradient(230deg, #FDA69B, #FAFAFC); */
            background-color: #f8bcb4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            padding-top: 410px;
        }
    </style>
</head>

<body class="fade-in-pagina">

    <div class="header">
        <a href="home_atendente.html"><img src="../imagem/voltar.png" class="seta-voltar" alt="seta" title="Voltar"></a>
        <p>Setor: <span class="tipo-acesso">Atendimento</span></p>
    </div>

    <div class="fundo">

        <!-- <div class="margemsegura2"></div> -->

        <div class="container">
            <img src='../imagem/logo/1.png' alt="logo">
            
            <h1 class="titulo">Agendamento</h1>

            <form onsubmit="event.preventDefault(); cadastrar();">
                <label>Nome do Cliente</label>
                <input type="text" id="nomeCliente" required>

                <label>Profissional</label>
                <input type="text" id="profissional" required>

                <label>Tipo Serviço</label>                
                <select name="#" id="tipoServ">
                    <option value="default">-- Selecione --</option>
                    <option value="clinico">Clínico</option>
                    <option value="enfermagem">Enfermagem</option>
                    <option value="acompanhante">Acompanhante</option>
                </select>

                <label>Data Agendada</label>
                <input type="date" id="dataAgendada" required>

                <label>Status</label>                
                <select name="#" id="statusAgend">
                    <option value="default">-- Selecione --</option>
                    <option value="confirmado">Confirmado</option>
                    <option value="aconfirmar">A confirmar</option>
                </select>

                <label>Observações</label>
                <textarea type="text" id="observacao" cols="10" rows="5" required></textarea>

                <input type="submit" value=" CADASTRAR PRODUTO ">
                
            </form>
            
        </div>
    
    </div>

    <dialog id="msg">
        <!-- <p>Acesso ao Painel de Controle liberado</p> -->
        <h3>Agendamento concluído</h3>
        <input type="submit" id="ok" value="Ok" onsubmit="event.preventDefault(); proximaTela();"></input>
    </dialog>

    <script>

        function cadastrar() {

            const modal = document.getElementById('msg');
            const btnFechar = document.getElementById('ok');

            modal.showModal();
            btnFechar.onclick = () => proximaTela();

        }

        function proximaTela() {
            //window.location.reload();
            setTimeout(function () {
                window.location.href = 'home_atendente.html';
            }, 100);
        }

    </script>
    
</body>
</html>
