<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Serviços</title>
    <link rel="stylesheet" href="../estilos/style_cadastros.css">
    
</head>

<body>

    <div class="header">
        <a href="home_atendente.html"><img src="../imagem/voltar.png" class="seta-voltar" alt="seta" title="Voltar"></a>
        <p>Setor: <span class="tipo-acesso">Atendimento</span></p>
    </div>

    <div class="fundo">
        <div class="margemsegura"></div>
        <div class="container">
            <img src='../imagem/logo/1.png' alt="logo">
            
            <h1 class="titulo">Cadastro de Serviço</h1>

            <form onsubmit="event.preventDefault(); cadastrar();">
                <label>Nome do Serviço</label>
                <input type="text" id="servico" required>

                <label>Descrição do Serviço</label>
                <textarea type="text" id="descricao" cols="10" rows="5" required></textarea>
                
                <label>Preço Base</label>
                <input type="text" id="precobase" onkeyup="moeda(this)" placeholder="R$ 0,00" required>

                <input type="submit" value=" CADASTRAR SERVIÇO ">
                
            </form>
            
        </div>
    
    </div>

    <dialog id="msg">
        <!-- <p>Acesso ao Painel de Controle liberado</p> -->
        <h3>Serviço cadastrado com sucesso!</h3>
        <input type="submit" id="ok" value="Ok" onsubmit="event.preventDefault(); proximaTela();"></input>
    </dialog>

    <script>

        function cadastrar() {

            const modal = document.getElementById('msg');
            const btnFechar = document.getElementById('ok');

            modal.showModal();
            btnFechar.onclick = () => proximaTela();

        }

        function proximaTela() {
            //window.location.reload();
            setTimeout(function () {
                window.location.href = 'home_atendente.html';
            }, 100);
        }

        function moeda(o) {
            // Remove tudo que não for dígito
            let v = o.value.replace(/\D/g, '');
            // Formata como real (ex: 1000 -> 10,00)
            v = (v / 100).toFixed(2) + '';
            v = v.replace(".", ",");
            // Adiciona pontos de milhar
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");

            o.value = "R$ " + v;
        }

    </script>
    
</body>
</html>
