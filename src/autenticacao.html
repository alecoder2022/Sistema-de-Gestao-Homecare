<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELA DE LOGIN - GEC (Gerenciamento e Controle)</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="./estilos/style_autenticacao.css">
</head>

<body class="fade-in-pagina">

    <div class="fundo">

        <div class="container">
            <img src='imagem/logo/2-transp.png' alt="logo">
            <form class="formulario">
                <label>Login</label>
                <input type="text" id="login">

                <label>Senha</label>
                <input type="password" id="senha">  

                <input id="botao" type="button" value="Logar" onclick="validacao()">
            </form>

            <div class="back">
                <a href="../index.html">
                    <img src="imagem/voltar.png" alt="voltar" title="Voltar">
                </a>
            </div>
            
        </div>
    
    </div>

    <dialog id="msg">
        <p>Acesso total ao Painel de Controle</p>
        <h3>Bem-Vindo Gestor!</h3>
    </dialog>

    <dialog id="msg2">
        <p>Acesso parcial ao Painel de Controle</p>
        <h3>Bem-Vindo Atendente!</h3>
    </dialog>

    <dialog id="msg3">
        <h3>⚠️ Usuário ou senha inválidos!</h3>
    </dialog>

    <script>

        function validacao() {

            const modal = document.getElementById('msg');
            const modal2 = document.getElementById('msg2');
            const modal3 = document.getElementById('msg3');
            const btnFechar = document.getElementById('ok');

            if (document.getElementById('login').value == "admin" && document.getElementById('senha').value == "opec2026") {

                modal.showModal();          
                setTimeout(function () {
                    window.location.href = "gestor/home_gestor.html";
                }, 3500);

            }
            else if (document.getElementById('login').value == "operacional" && document.getElementById('senha').value == "opec2026") {

                modal2.showModal();          
                setTimeout(function () {
                    window.location.href = "atendimento/home_atendente.html";
                }, 3500);

            }
            
            else {
                modal3.showModal();
                setTimeout(function () {
                    window.location.reload(true);
                }, 2000);
                
            }

        }

    </script>

</body>
</html>
